<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BOOKスカウト｜作品</title>
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="./style.css" />

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-09Q7K095VK"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-09Q7K095VK');
  </script>

  <!-- PWA / Home screen icons -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0b0f14" />

  <!-- iOS home screen -->
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <!-- Favicons -->
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="assets/icons/favicon-16.png" />
</head>
<body class="has-gheader">
  <main class="wrap">
    <div class="status" style="margin-top:24px;">作品ページへ移動しています…</div>
    <div class="status" style="opacity:.7;">自動で移動しない場合は、URLの key を確認してください。</div>
  </main>

  <script>
    (function () {
      const p = new URLSearchParams(location.search);
      const key = (p.get("key") || "").trim();
      const v = (p.get("v") || "").trim();

      function b64urlFromUtf8(s) {
        const bytes = new TextEncoder().encode(String(s ?? ""));
        let bin = "";
        for (const b of bytes) bin += String.fromCharCode(b);
        const b64 = btoa(bin);
        return b64.replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
      }

      if (!key) return;

      const id = b64urlFromUtf8(key);
      const qs = v ? ("?v=" + encodeURIComponent(v)) : "";
      const to = "./work/" + id + "/" + qs;

      // 履歴を汚さない
      location.replace(to);
    })();
  </script>
</body>
</html>
