<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BOOKスカウト｜ランキング</title>
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <header class="gheader" id="gheader">
    <div class="gheader-inner">
      <div class="gbrand">
        <a class="gbrand-title" href="./index.html">BOOKスカウト</a>
        <div class="gbrand-sub">ランキング</div>
      </div>

      <nav class="gnav" aria-label="グローバルナビ">
        <a href="./index.html">ホーム</a>
        <a href="./list.html">リスト</a>
        <a class="is-active" href="./stats.html">ランキング</a>
      </nav>
    </div>

    <div class="rank-genres" role="tablist" aria-label="ジャンル絞り込み" id="rankGenreTabs"></div>

    <div class="rank-tabs" role="tablist" aria-label="ランキング切り替え">
      <button class="rank-tab is-active" type="button" data-tab="views" role="tab" aria-selected="true">
        人気ランキング
      </button>
      <button class="rank-tab" type="button" data-tab="fav" role="tab" aria-selected="false">
        支持率ランキング
      </button>
      <button class="rank-tab" type="button" data-tab="rate_rec" role="tab" aria-selected="false">
        ★おすすめ度
      </button>
      <button class="rank-tab" type="button" data-tab="rate_art" role="tab" aria-selected="false">
        ★作画クオリティ
      </button>
    </div>
  </header>

  <main class="wrap">
    <div id="status" class="status"></div>

    <!-- 人気 -->
    <section class="section" id="panelViews" role="tabpanel" aria-label="人気ランキング" style="margin-top:10px;">
      <div class="section-head">
        <h2 class="section-title">人気ランキング</h2>
      </div>
      <p class="section-sub">※ 閲覧数＝作品詳細が表示された回数（同一セッションは1回）</p>
      <section id="rankViews" class="rank-grid"></section>
      <div class="rank-more"><button id="moreViews" type="button">もっと見る</button></div>
    </section>

    <!-- 支持率 -->
    <section class="section" id="panelFav" role="tabpanel" aria-label="支持率ランキング" style="margin-top:10px; display:none;">
      <div class="section-head">
        <h2 class="section-title">支持率ランキング</h2>
      </div>
      <p class="section-sub">※ 支持率＝（お気に入り数 ÷ 閲覧数）×100（閲覧数10以上のみ）</p>
      <section id="rankFav" class="rank-grid"></section>
      <div class="rank-more"><button id="moreFav" type="button">もっと見る</button></div>
    </section>

    <!-- ★おすすめ度 -->
    <section class="section" id="panelRateRec" role="tabpanel" aria-label="おすすめ度ランキング" style="margin-top:10px; display:none;">
      <div class="section-head">
        <h2 class="section-title">★おすすめ度ランキング</h2>
      </div>
      <p class="section-sub">※ 平均★（直近30日）/ n=投票数</p>
      <section id="rankRateRec" class="rank-grid"></section>
      <div class="rank-more"><button id="moreRateRec" type="button">もっと見る</button></div>
    </section>

    <!-- ★作画クオリティ -->
    <section class="section" id="panelRateArt" role="tabpanel" aria-label="作画クオリティランキング" style="margin-top:10px; display:none;">
      <div class="section-head">
        <h2 class="section-title">★作画クオリティランキング</h2>
      </div>
      <p class="section-sub">※ 平均★（直近30日）/ n=投票数</p>
      <section id="rankRateArt" class="rank-grid"></section>
      <div class="rank-more"><button id="moreRateArt" type="button">もっと見る</button></div>
    </section>

    <footer class="gfooter" aria-label="サイトフッター">
      <div class="gfooter-inner">
        <span>© Tools-LABO</span>
        <a href="./privacy/">プライバシーポリシー</a>
        <a
          href="https://docs.google.com/forms/d/e/1FAIpQLSfF73yZ69HH-FASKEYSkp98zM92o4dtQLtiQs7BzLRuwsobfA/viewform?pli=1"
          target="_blank"
          rel="noopener noreferrer"
        >お問い合わせ</a>
      </div>
    </footer>
  </main>

  <script>
    function qs() { return new URLSearchParams(location.search); }

    async function loadJson(url, { bust = false } = {}) {
      const r = await fetch(url, { cache: bust ? "no-store" : "default" });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return await r.json();
    }
    async function tryLoadJson(url, { bust = false } = {}) {
      try { return await loadJson(url, { bust }); } catch { return null; }
    }

    function esc(s) {
      return String(s ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function toText(v) {
      if (v == null) return "";
      if (typeof v === "string") return v.trim();
      if (typeof v === "number" || typeof v === "boolean") return String(v);

      if (Array.isArray(v)) {
        const xs = v.map(toText).filter(Boolean);
        const seen = new Set();
        const uniq = xs.filter(x => (seen.has(x) ? false : (seen.add(x), true)));
        return uniq.join(" / ");
      }

      if (typeof v === "object") {
        const keys = ["name","ja","jp","label","value","text","title","publisher","company","display","brand","manufacturer"];
        for (const k of keys) {
          if (v[k] != null) {
            const t = toText(v[k]);
            if (t) return t;
          }
        }
        return "";
      }
      return "";
    }

    function pick(it, keys) {
      for (const k of keys) {
        const v = k.includes(".")
          ? k.split(".").reduce((o, kk) => (o ? o[kk] : undefined), it)
          : it?.[k];
        if (Array.isArray(v)) return v;
        if (toText(v)) return v;
      }
      return null;
    }

    function pickArr(it, keys) {
      for (const k of keys) {
        const v = k.includes(".")
          ? k.split(".").reduce((o, kk) => (o ? o[kk] : undefined), it)
          : it?.[k];
        if (Array.isArray(v) && v.length) return v;
      }
      return [];
    }

    function normalizeImgUrl(u) {
      const raw = toText(u);
      if (!raw) return "";
      let x = "";
      try { x = encodeURI(raw); } catch { x = raw; }
      x = x.replaceAll("+", "%2B");
      return x;
    }

    function setStatus(msg) {
      const s = document.getElementById("status");
      if (s) s.textContent = msg;
    }

    function pillsMax6(list) {
      const xs = (list || []).map(toText).filter(Boolean);
      if (!xs.length) return "";
      const head = xs.slice(0, 6);
      const rest = xs.length - head.length;
      const more = rest > 0 ? `<span class="pill">+${rest}</span>` : "";
      return `<div class="pills">${head.map(x => `<span class="pill">${esc(x)}</span>`).join("")}${more}</div>`;
    }

    function pickRows(obj) {
      if (!obj) return [];
      if (Array.isArray(obj)) return obj;
      if (Array.isArray(obj?.rows)) return obj.rows;
      if (Array.isArray(obj?.data)) return obj.data;
      return [];
    }

    function getWorkMap(items) {
      const map = new Map();
      for (const it of (items || [])) {
        const seriesKey = toText(pick(it, ["seriesKey"]));
        if (!seriesKey) continue;
        map.set(seriesKey, it);
      }
      return map;
    }

    // ===== Works loader (split index 優先 / legacy fallback) =====
    const WORKS_INDEX_PATH = "./data/lane2/works/index.json";
    const WORKS_LEGACY_PATH = "./data/lane2/works.json";

    async function loadWorksForStats({ bust }) {
      const v = qs().get("v");
      const idxUrl = v ? `${WORKS_INDEX_PATH}?v=${encodeURIComponent(v)}` : WORKS_INDEX_PATH;

      const idx = await tryLoadJson(idxUrl, { bust });
      if (idx && Array.isArray(idx.listItems)) {
        // listItems だけで stats は成立（author が無い場合は表示しない）
        return idx.listItems;
      }

      const legacyUrl = v ? `${WORKS_LEGACY_PATH}?v=${encodeURIComponent(v)}` : WORKS_LEGACY_PATH;
      const works = await loadJson(legacyUrl, { bust });
      const items = Array.isArray(works?.items) ? works.items : [];
      return items;
    }

    // ---- Rank item HTML ----
    function posClass(rank){
      if (rank === 1) return "is-1";
      if (rank === 2) return "is-2";
      if (rank === 3) return "is-3";
      return "";
    }

    function fmtPct(x){
      if (!Number.isFinite(x) || x <= 0) return "0%";
      if (x >= 10) return `${Math.round(x)}%`;
      return `${Math.round(x * 10) / 10}%`; // 0.0〜9.9
    }

    function fmtStar(avg){
      const n = Number(avg);
      if (!Number.isFinite(n) || n <= 0) return "★-";
      return `★${(Math.round(n * 10) / 10).toFixed(1)}`;
    }

    function rankItemHtml({ rank, seriesKey, unit, work, views, fav, supportPct, rateAvg, rateN }) {
      const key = encodeURIComponent(seriesKey);

      const title = toText(pick(work, ["title", "vol1.title"])) || seriesKey || "(無題)";
      const author = toText(pick(work, ["author", "vol1.author"])) || "";
      const magazine = toText(pick(work, ["magazine", "vol1.magazine"])) || "";

      const imgRaw = toText(pick(work, ["image", "vol1.image"])) || "";
      const img = normalizeImgUrl(imgRaw);

      const tagsJa = pickArr(work, ["tags", "vol1.tags"]).map(toText).filter(Boolean);

      const isFav = unit === "fav";
      const isRate = (unit === "rate_rec" || unit === "rate_art");

      const numText = isRate ? fmtStar(rateAvg) : (isFav ? fmtPct(supportPct) : String(Number(views || 0)));
      const lblText = isRate
        ? (unit === "rate_rec" ? "おすすめ" : "作画")
        : (isFav ? "支持率" : "閲覧");

      // 支持率では「お気に入り/閲覧」も小さく補助表示（意味が伝わる）
      const aux = isFav
        ? `お気に入り: ${Number(fav||0)} / 閲覧: ${Number(views||0)}`
        : (isRate ? `n=${Number(rateN||0)}` : "");

      return `
        <article class="rank-item">
          <div class="rank-row">
            <div>
              <a href="./work.html?key=${key}" aria-label="${esc(title)}">
                <div class="rank-cover">
                  ${img ? `<img src="${esc(img)}" alt="${esc(title)}">` : ``}
                </div>
              </a>
            </div>

            <div class="rank-meta">
              <div class="rank-topline">
                <span class="rank-pos ${posClass(rank)}">${esc(rank)}位</span>
                <span class="rank-metric ${isFav ? "is-fav" : "is-view"}">
                  <span class="num">${esc(numText)}</span>
                  <span class="lbl">${esc(lblText)}</span>
                </span>
              </div>

              <div class="title"><a href="./work.html?key=${key}">${esc(seriesKey || title)}</a></div>
              ${author ? `<div class="sub">${esc(author)}</div>` : ""}
              ${magazine ? `<div class="sub">連載誌: ${esc(magazine)}</div>` : ""}
              ${aux ? `<div class="sub">${esc(aux)}</div>` : ""}

              ${tagsJa.length ? `<div class="sub">タグ</div>${pillsMax6(tagsJa)}` : ""}
            </div>
          </div>
        </article>
      `;
    }

    // ---- ジャンル絞り込み（stats専用） ----
    const RANK_GENRE_TABS = [
      { id: "all",    label: "すべて", match: [] },
      { id: "action", label: "アクション・バトル", match: ["Action"] },
      { id: "fantasy",label: "ファンタジー・異世界", match: ["Fantasy"] },
      { id: "sf",     label: "SF", match: ["Sci-Fi"] },
      { id: "horror", label: "ホラー", match: ["Horror"] },
      { id: "mystery",label: "ミステリー・サスペンス", match: ["Mystery", "Thriller"] },
      { id: "romance",label: "恋愛・ラブコメ", match: ["Romance"] },
      { id: "slice",  label: "日常", match: ["Slice of Life"] },
      { id: "sports", label: "スポーツ", match: ["Sports"] },
      { id: "drama",  label: "ヒューマンドラマ", match: ["Drama"] },
      { id: "other",  label: "その他", match: ["Adventure", "Psychological", "Supernatural"] },
    ];

    function getRankGenreState() {
      const id = toText(qs().get("rg")) || "all";
      return RANK_GENRE_TABS.some(t => t.id === id) ? id : "all";
    }

    function setRankGenreState(nextId) {
      const p = qs();
      const clean = toText(nextId) || "all";
      if (clean === "all") p.delete("rg");
      else p.set("rg", clean);
      const url = `${location.pathname}?${p.toString()}`;
      history.replaceState(null, "", url);
    }

    function hasAnyGenre(work, wanted) {
      if (!wanted?.length) return true;
      const g = pickArr(work, ["genres", "vol1.genres"]).map(toText).filter(Boolean);
      return wanted.some(x => g.includes(x));
    }

    function renderRankGenreTabs(activeId) {
      const root = document.getElementById("rankGenreTabs");
      if (!root) return;

      root.innerHTML = RANK_GENRE_TABS.map(t => `
        <button
          class="rank-genre ${t.id === activeId ? "is-active" : ""}"
          type="button"
          data-rg="${esc(t.id)}"
          role="tab"
          aria-selected="${t.id === activeId ? "true" : "false"}"
        >
          ${esc(t.label)}
        </button>
      `).join("");

      root.onclick = (ev) => {
        const btn = ev.target?.closest?.("button[data-rg]");
        if (!btn) return;
        const next = btn.getAttribute("data-rg") || "all";
        if (next === getRankGenreState()) return;

        setRankGenreState(next);
        applyGenreAndRerender();
      };
    }

    // ---- 支持率（B案） ----
    const MIN_VIEWS_FOR_SUPPORT = 10; // ←確定
    const WEIGHT_FULL_AT = 20;        // views>=20 で満額（w=1）

    function weightByViews(views) {
      const v = Number(views || 0);
      if (v <= 0) return 0;
      return Math.min(1, v / WEIGHT_FULL_AT);
    }

    // ---- 状態 ----
    const MAX_ROWS = 100;
    const STEP = 50;

    // ★ rating metrics
    const METRIC_RATE_REC_TOP_PATH = "./data/metrics/wae/rate_rec_top.json";
    const METRIC_RATE_ART_TOP_PATH = "./data/metrics/wae/rate_art_top.json";

    let state = {
      tab: "views",

      viewsShown: 0,
      favShown: 0,
      rateRecShown: 0,
      rateArtShown: 0,

      viewsAll: [],
      favAll: [],
      rateRecAll: [],
      rateArtAll: [],

      viewsRows: [],
      favRows: [],

      rateRecRows: [],
      rateArtRows: [],

      workMap: new Map(),
      viewMap: new Map(),
    };

    function setTab(next) {
      state.tab = next;

      document.querySelectorAll(".rank-tab[data-tab]").forEach(btn => {
        const id = btn.getAttribute("data-tab") || "";
        const on = (id === next);
        btn.classList.toggle("is-active", on);
        btn.setAttribute("aria-selected", on ? "true" : "false");
      });

      const pViews = document.getElementById("panelViews");
      const pFav   = document.getElementById("panelFav");
      const pRR    = document.getElementById("panelRateRec");
      const pRA    = document.getElementById("panelRateArt");

      if (pViews) pViews.style.display = (next === "views") ? "" : "none";
      if (pFav)   pFav.style.display   = (next === "fav") ? "" : "none";
      if (pRR)    pRR.style.display    = (next === "rate_rec") ? "" : "none";
      if (pRA)    pRA.style.display    = (next === "rate_art") ? "" : "none";
    }

    function updateMoreButton(kind) {
      const setBtn = (id, hasMore) => {
        const btn = document.getElementById(id);
        if (!btn) return;
        btn.disabled = !hasMore;
        btn.textContent = hasMore ? "もっと見る" : "ここまで";
      };

      if (kind === "views") {
        const hasMore = state.viewsShown < Math.min(MAX_ROWS, state.viewsRows.length);
        setBtn("moreViews", hasMore);
      }
      if (kind === "fav") {
        const hasMore = state.favShown < Math.min(MAX_ROWS, state.favRows.length);
        setBtn("moreFav", hasMore);
      }
      if (kind === "rate_rec") {
        const hasMore = state.rateRecShown < Math.min(MAX_ROWS, state.rateRecRows.length);
        setBtn("moreRateRec", hasMore);
      }
      if (kind === "rate_art") {
        const hasMore = state.rateArtShown < Math.min(MAX_ROWS, state.rateArtRows.length);
        setBtn("moreRateArt", hasMore);
      }
    }

    function renderMore(kind) {
      if (kind === "views") {
        const root = document.getElementById("rankViews");
        if (!root) return;

        const next = Math.min(MAX_ROWS, state.viewsShown + STEP);
        const chunk = state.viewsRows.slice(state.viewsShown, next);

        const html = chunk.map((r, i) => {
          const seriesKey = toText(r?.seriesKey);
          const views = Number(r?.n || 0);
          const work = state.workMap.get(seriesKey);
          const rank = state.viewsShown + i + 1;
          return (seriesKey && work)
            ? rankItemHtml({ rank, seriesKey, unit: "view", work, views, fav: 0, supportPct: 0, rateAvg: 0, rateN: 0 })
            : "";
        }).join("");

        if (state.viewsShown === 0) root.innerHTML = html || `<div class="status">データがまだありません</div>`;
        else root.insertAdjacentHTML("beforeend", html);

        state.viewsShown = next;
        updateMoreButton("views");
      }

      if (kind === "fav") {
        const root = document.getElementById("rankFav");
        if (!root) return;

        const next = Math.min(MAX_ROWS, state.favShown + STEP);
        const chunk = state.favRows.slice(state.favShown, next);

        const html = chunk.map((r, i) => {
          const seriesKey = toText(r?.seriesKey);
          const work = state.workMap.get(seriesKey);
          const rank = state.favShown + i + 1;
          return (seriesKey && work)
            ? rankItemHtml({
                rank,
                seriesKey,
                unit: "fav",
                work,
                views: r.views,
                fav: r.fav,
                supportPct: r.supportPct,
                rateAvg: 0,
                rateN: 0
              })
            : "";
        }).join("");

        if (state.favShown === 0) root.innerHTML = html || `<div class="status">データがまだありません</div>`;
        else root.insertAdjacentHTML("beforeend", html);

        state.favShown = next;
        updateMoreButton("fav");
      }

      if (kind === "rate_rec") {
        const root = document.getElementById("rankRateRec");
        if (!root) return;

        const next = Math.min(MAX_ROWS, state.rateRecShown + STEP);
        const chunk = state.rateRecRows.slice(state.rateRecShown, next);

        const html = chunk.map((r, i) => {
          const seriesKey = toText(r?.seriesKey);
          const work = state.workMap.get(seriesKey);
          const rank = state.rateRecShown + i + 1;
          const avg = Number(r?.avg ?? 0);
          const n = Number(r?.n ?? 0);
          return (seriesKey && work)
            ? rankItemHtml({
                rank,
                seriesKey,
                unit: "rate_rec",
                work,
                views: 0,
                fav: 0,
                supportPct: 0,
                rateAvg: avg,
                rateN: n
              })
            : "";
        }).join("");

        if (state.rateRecShown === 0) root.innerHTML = html || `<div class="status">データがまだありません</div>`;
        else root.insertAdjacentHTML("beforeend", html);

        state.rateRecShown = next;
        updateMoreButton("rate_rec");
      }

      if (kind === "rate_art") {
        const root = document.getElementById("rankRateArt");
        if (!root) return;

        const next = Math.min(MAX_ROWS, state.rateArtShown + STEP);
        const chunk = state.rateArtRows.slice(state.rateArtShown, next);

        const html = chunk.map((r, i) => {
          const seriesKey = toText(r?.seriesKey);
          const work = state.workMap.get(seriesKey);
          const rank = state.rateArtShown + i + 1;
          const avg = Number(r?.avg ?? 0);
          const n = Number(r?.n ?? 0);
          return (seriesKey && work)
            ? rankItemHtml({
                rank,
                seriesKey,
                unit: "rate_art",
                work,
                views: 0,
                fav: 0,
                supportPct: 0,
                rateAvg: avg,
                rateN: n
              })
            : "";
        }).join("");

        if (state.rateArtShown === 0) root.innerHTML = html || `<div class="status">データがまだありません</div>`;
        else root.insertAdjacentHTML("beforeend", html);

        state.rateArtShown = next;
        updateMoreButton("rate_art");
      }
    }

    function buildViewMap(viewRows) {
      const m = new Map();
      for (const r of (viewRows || [])) {
        const sk = toText(r?.seriesKey);
        if (!sk) continue;
        m.set(sk, Number(r?.n || 0));
      }
      return m;
    }

    function buildSupportRows(favRowsRaw, viewMap) {
      const out = [];

      for (const r of (favRowsRaw || [])) {
        const sk = toText(r?.seriesKey);
        if (!sk) continue;

        const fav = Number(r?.n || 0);
        const views = Number(viewMap.get(sk) || 0);

        // views 条件
        if (views < MIN_VIEWS_FOR_SUPPORT) continue;

        // support% は表示用
        const supportPct = (views > 0) ? (fav / views * 100) : 0;

        // score は並び替え用（暴れ対策）
        const w = weightByViews(views);
        const score = (views > 0) ? ((fav / views) * w) : 0;

        out.push({ seriesKey: sk, fav, views, supportPct, score });
      }

      // 降順：score → views → fav
      out.sort((a, b) => {
        if (b.score !== a.score) return b.score - a.score;
        if (b.views !== a.views) return b.views - a.views;
        return b.fav - a.fav;
      });

      return out;
    }

    function normalizeRateTopRows(obj) {
      const rows = pickRows(obj);
      return rows.map(r => ({
        seriesKey: toText(r?.seriesKey),
        avg: Number(r?.avg ?? 0),
        n: Number(r?.n ?? 0),
      })).filter(x => x.seriesKey);
    }

    function applyGenreAndRerender() {
      const activeId = getRankGenreState();
      const tab = RANK_GENRE_TABS.find(t => t.id === activeId) || RANK_GENRE_TABS[0];

      renderRankGenreTabs(tab.id);

      // Popular（閲覧数）：ジャンル絞り込み
      if (!tab.match?.length) {
        state.viewsRows = state.viewsAll.slice();
      } else {
        state.viewsRows = state.viewsAll.filter(r => {
          const sk = toText(r?.seriesKey);
          const w = state.workMap.get(sk);
          return w ? hasAnyGenre(w, tab.match) : false;
        });
      }

      // Support：ジャンル絞り込みは favAll を先に絞ってから計算
      let favBase = state.favAll.slice();
      if (tab.match?.length) {
        favBase = favBase.filter(r => {
          const sk = toText(r?.seriesKey);
          const w = state.workMap.get(sk);
          return w ? hasAnyGenre(w, tab.match) : false;
        });
      }
      state.favRows = buildSupportRows(favBase, state.viewMap);

      // Rate rec/art：ジャンル絞り込み（素直に seriesKey で work を見て絞る）
      if (!tab.match?.length) {
        state.rateRecRows = state.rateRecAll.slice();
        state.rateArtRows = state.rateArtAll.slice();
      } else {
        state.rateRecRows = state.rateRecAll.filter(r => {
          const w = state.workMap.get(r.seriesKey);
          return w ? hasAnyGenre(w, tab.match) : false;
        });
        state.rateArtRows = state.rateArtAll.filter(r => {
          const w = state.workMap.get(r.seriesKey);
          return w ? hasAnyGenre(w, tab.match) : false;
        });
      }

      // 描画リセット
      state.viewsShown = 0;
      state.favShown = 0;
      state.rateRecShown = 0;
      state.rateArtShown = 0;

      const rv = document.getElementById("rankViews");
      const rf = document.getElementById("rankFav");
      const rrr = document.getElementById("rankRateRec");
      const rra = document.getElementById("rankRateArt");
      if (rv) rv.innerHTML = "";
      if (rf) rf.innerHTML = "";
      if (rrr) rrr.innerHTML = "";
      if (rra) rra.innerHTML = "";

      renderMore("views");
      renderMore("fav");
      renderMore("rate_rec");
      renderMore("rate_art");

      // タブ状態維持
      setTab(state.tab);
    }

    // ヘッダー：下スクロールで隠す/上で出す
    (function () {
      const header = document.getElementById("gheader");
      if (!header) return;

      let lastY = window.scrollY || 0;
      let ticking = false;

      const SHOW_THRESHOLD = 2;
      const HIDE_THRESHOLD = 8;
      const TOP_KEEP = 12;

      function onScroll() {
        const y = window.scrollY || 0;
        const dy = y - lastY;

        if (y <= TOP_KEEP) { header.classList.remove("is-hidden"); lastY = y; return; }
        if (dy > HIDE_THRESHOLD) { header.classList.add("is-hidden"); lastY = y; return; }
        if (dy < -SHOW_THRESHOLD) { header.classList.remove("is-hidden"); lastY = y; return; }
      }

      window.addEventListener("scroll", () => {
        if (ticking) return;
        ticking = true;
        requestAnimationFrame(() => { ticking = false; onScroll(); });
      }, { passive: true });
    })();

    async function run() {
      try {
        const v = qs().get("v");
        const bust = !!v;
        const vq = v ? `?v=${encodeURIComponent(v)}` : "";

        // works（split優先）
        const worksItems = await loadWorksForStats({ bust });
        state.workMap = getWorkMap(worksItems);

        // views / fav
        const viewBySeries = await tryLoadJson(`./data/metrics/wae/work_view_by_series.json${vq}`, { bust });
        const favBySeries  = await tryLoadJson(`./data/metrics/wae/favorite_by_series.json${vq}`, { bust });

        state.viewsAll = pickRows(viewBySeries);
        state.favAll   = pickRows(favBySeries);

        // view map（支持率計算用）
        state.viewMap = buildViewMap(state.viewsAll);

        // rate rec/art（無ければ空）
        const recTop = await tryLoadJson(`${METRIC_RATE_REC_TOP_PATH}${vq}`, { bust });
        const artTop = await tryLoadJson(`${METRIC_RATE_ART_TOP_PATH}${vq}`, { bust });

        state.rateRecAll = normalizeRateTopRows(recTop);
        state.rateArtAll = normalizeRateTopRows(artTop);

        // 初期tabは人気
        state.tab = "views";

        // タブ操作
        document.querySelectorAll(".rank-tab[data-tab]").forEach(btn => {
          btn.addEventListener("click", () => {
            const next = btn.getAttribute("data-tab") || "views";
            setTab(next);
          }, { passive: true });
        });

        // もっと見る
        const moreViews = document.getElementById("moreViews");
        if (moreViews) moreViews.addEventListener("click", () => renderMore("views"), { passive: true });

        const moreFav = document.getElementById("moreFav");
        if (moreFav) moreFav.addEventListener("click", () => renderMore("fav"), { passive: true });

        const moreRateRec = document.getElementById("moreRateRec");
        if (moreRateRec) moreRateRec.addEventListener("click", () => renderMore("rate_rec"), { passive: true });

        const moreRateArt = document.getElementById("moreRateArt");
        if (moreRateArt) moreRateArt.addEventListener("click", () => renderMore("rate_art"), { passive: true });

        applyGenreAndRerender();
        setStatus("");
      } catch (e) {
        console.error(e);
        setStatus("集計データの読み込みに失敗しました（まだJSONが無い可能性あり）");
      }
    }

    run();
  </script>
</body>
</html>
