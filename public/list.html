  <!-- gheader hide/show -->
  <script>
    (function () {
      const header = document.getElementById("gheader");
      if (!header) return;

      let lastY = window.scrollY || 0;
      let ticking = false;

      const SHOW_THRESHOLD = 2;
      const HIDE_THRESHOLD = 8;
      const TOP_KEEP = 12;

      function onScroll() {
        const y = window.scrollY || 0;
        const dy = y - lastY;

        if (y <= TOP_KEEP) { header.classList.remove("is-hidden"); lastY = y; return; }
        if (dy > HIDE_THRESHOLD) { header.classList.add("is-hidden"); lastY = y; return; }
        if (dy < -SHOW_THRESHOLD) { header.classList.remove("is-hidden"); lastY = y; return; }
      }

      window.addEventListener("scroll", () => {
        if (ticking) return;
        ticking = true;
        requestAnimationFrame(() => { ticking = false; onScroll(); });
      }, { passive: true });
    })();
  </script>

  <!-- ✅ Sheet open/close（app.jsに触らない） + シート内件数表示 -->
  <script>
    (function () {
      const sheet = document.getElementById("filterSheet");
      const openBtn = document.getElementById("openFilterSheetBtn");
      const fab = document.getElementById("filterFab");
      const mainCount = document.getElementById("listCount");
      if (!sheet) return;

      // ✅ シート内にも「リスト件数」を表示（app.jsは触らない）
      function ensureSheetCount() {
        if (!mainCount) return;
        if (document.getElementById("sheetListCount")) return;

        const head = sheet.querySelector(".sheet-head");
        if (!head) return;

        const el = document.createElement("div");
        el.id = "sheetListCount";
        el.className = "list-topbar-count"; // 既存CSSを流用
        el.style.marginLeft = "8px";
        el.style.whiteSpace = "nowrap";
        el.style.fontVariantNumeric = "tabular-nums";
        el.textContent = mainCount.textContent || "";

        const title = head.querySelector(".sheet-title");
        if (title) title.insertAdjacentElement("afterend", el);
        else head.appendChild(el);

        const sync = () => { el.textContent = mainCount.textContent || ""; };

        try {
          const mo = new MutationObserver(sync);
          mo.observe(mainCount, { childList: true, characterData: true, subtree: true });
        } catch {}

        sync();
      }

      function syncSheetCountNow() {
        const el = document.getElementById("sheetListCount");
        if (!el || !mainCount) return;
        el.textContent = mainCount.textContent || "";
      }

      function openSheet() {
        ensureSheetCount();
        syncSheetCountNow();

        document.body.classList.add("sheet-open");
        sheet.classList.add("is-open");
        sheet.setAttribute("aria-hidden", "false");

        const closeBtn = sheet.querySelector("[data-sheet-close='1']");
        try { closeBtn && closeBtn.focus(); } catch {}
      }

      function closeSheet() {
        sheet.classList.remove("is-open");
        sheet.setAttribute("aria-hidden", "true");
        document.body.classList.remove("sheet-open");
        try { openBtn && openBtn.focus(); } catch {}
      }

      function onKeyDown(e){
        if (e.key === "Escape") closeSheet();
      }

      if (openBtn) openBtn.addEventListener("click", openSheet, { passive: true });
      if (fab) fab.addEventListener("click", openSheet, { passive: true });

      sheet.addEventListener("click", (e) => {
        const t = e.target;
        if (!t) return;
        const close = t.closest && t.closest("[data-sheet-close='1']");
        if (close) closeSheet();
      });

      window.addEventListener("keydown", onKeyDown);

      // iOS: シート開いてる間の背景スクロール抑止（CSSで足りない端末向け）
      document.addEventListener("touchmove", (e) => {
        if (!sheet.classList.contains("is-open")) return;
        const inPanel = e.target && e.target.closest && e.target.closest(".sheet-panel");
        if (!inPanel) e.preventDefault();
      }, { passive: false });
    })();
  </script>
