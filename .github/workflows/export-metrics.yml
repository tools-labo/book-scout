# .github/workflows/export-metrics.yml
name: Export WAE metrics

on:
  workflow_dispatch: {}
  schedule:
    - cron: "15 * * * *" # 毎時15分

permissions:
  contents: write

concurrency:
  group: export-metrics
  cancel-in-progress: true

jobs:
  export_and_commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        run: npm install

      - name: Export metrics from Analytics Engine
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_AE_READ_TOKEN: ${{ secrets.CLOUDFLARE_AE_READ_TOKEN }}
        run: node scripts/metrics/export_wae_metrics.mjs

      - name: Commit & push metrics
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/metrics

          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi

          git commit -m "metrics: update wae exports"
          git push origin "HEAD:${GITHUB_REF_NAME}"
