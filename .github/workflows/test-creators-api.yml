# .github/workflows/test-creators-api.yml
name: Test Creators API

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Creators API base URL"
        required: true
        type: string
      test_path:
        description: "Creators API test path"
        required: true
        type: string
      test_asin:
        description: "Test ASIN (optional)"
        required: false
        default: "4088821297"
        type: string

jobs:
  test-creators-api:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Show target (safe)
        run: |
          echo "BASE_URL=${{ inputs.base_url }}"
          echo "TEST_PATH=${{ inputs.test_path }}"
          echo "TEST_ASIN=${{ inputs.test_asin }}"

      - name: Run Creators API test
        run: node scripts/lane2/test_creators_api.mjs
        env:
          AMAZON_CREATORS_CLIENT_ID: ${{ secrets.AMAZON_CREATORS_CLIENT_ID }}
          AMAZON_CREATORS_CLIENT_SECRET: ${{ secrets.AMAZON_CREATORS_CLIENT_SECRET }}
          AMAZON_PARTNER_TAG: ${{ secrets.AMAZON_PARTNER_TAG }}
          AMAZON_MARKETPLACE: ${{ secrets.AMAZON_MARKETPLACE }}

          AMAZON_CREATORS_BASE_URL: ${{ inputs.base_url }}
          AMAZON_CREATORS_TEST_PATH: ${{ inputs.test_path }}
          AMAZON_TEST_ASIN: ${{ inputs.test_asin }}
