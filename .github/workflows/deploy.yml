# .github/workflows/deploy.yml
name: Deploy Pages

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - "Lane2 - Confirm Vol1 (NDL + Amazon PA-API)"
    types:
      - completed
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Prepare site root
        run: |
          set -euo pipefail
          rm -rf public/data
          mkdir -p public/data
          if [ -d data ]; then
            cp -R data/* public/data/ || true
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install (for build script)
        run: npm install

      - name: Build work pages (static /work/<id>/)
        run: |
          set -euo pipefail
          node scripts/build_work_pages.mjs

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - id: deployment
        uses: actions/deploy-pages@v4
